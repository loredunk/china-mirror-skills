name: README Refresh

on:
  push:
    branches: [main]
    paths:
      - 'data/mirrors.yml'
      - 'scripts/render_readme.py'
      - 'docs/**'
  workflow_run:
    workflows: ["Mirror Health Check"]
    types: [completed]
  workflow_dispatch:

jobs:
  render-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can push
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render README
        run: python scripts/render_readme.py

      - name: Commit README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README unchanged, nothing to commit"
          else
            git commit -m "docs: regenerate README.md [skip ci]"
            git push
          fi
