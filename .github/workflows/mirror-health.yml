name: Mirror Health Check

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 08:00（UTC 00:00）
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-mirrors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mirror health check
        run: python scripts/check_mirrors.py --output reports/report.json
        continue-on-error: true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mirror-health-report
          path: reports/report.json
          retention-days: 30

      - name: Commit report to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/report.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update mirror health report [skip ci]"
            git push
          fi

      - name: Sync critical outage alert issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/mirror_alert.py

      - name: Fail workflow on critical outage
        if: always()
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report_path = Path("reports/report.json")
          if not report_path.exists():
              print("reports/report.json is missing")
              sys.exit(1)

          report = json.loads(report_path.read_text(encoding="utf-8"))
          critical = report.get("summary", {}).get("critical_categories", [])
          if critical:
              print(f"Critical categories: {', '.join(critical)}")
              sys.exit(1)

          print("No critical category outages")
          PY
