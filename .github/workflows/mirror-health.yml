name: Mirror Health Check

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  check-mirrors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run mirror health check
        run: python scripts/check_mirrors.py --output reports/report.json
        continue-on-error: true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirror-health-report
          path: reports/report.json
          retention-days: 30

      - name: Commit report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/report.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update mirror health report [skip ci]"
            git push
          fi
