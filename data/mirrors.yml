# ==================== Categories Metadata ====================
#
# mirror_type 说明：
#   registry  - 包管理器注册源（配置工具下载包的地址，工具必须已安装）
#   install   - 工具安装源（下载工具本体的镜像，用于首次安装工具）
#   download  - 内容下载镜像（下载文件/模型/Release 资产等）
#   system    - 系统包管理器源（apt/apk 等）
#
categories:
  # --- registry: 配置包管理器注册源 ---
  pip:
    name: "Python (pip)"
    description: "PyPI 包注册源镜像，配置 pip/uv/poetry 下载 Python 包的地址"
    icon: "🐍"
    mirror_type: registry
    # quick_use_template 中可用占位符：{{ url }}（推荐镜像 URL）、{{ name }}、{{ host }}、{{ homepage }}
    quick_use_template: |
      ```bash
      # 一次性使用（仅当前命令）
      pip install -i {{ url }} <package>

      # 当前 shell 生效（关闭终端后失效）
      export PIP_INDEX_URL={{ url }}

      # 永久写入用户配置
      pip config set global.index-url {{ url }}
      ```
  npm:
    name: "Node.js (npm)"
    description: "npm 注册源镜像，配置 npm/yarn/pnpm 下载 JS 包的地址"
    icon: "📦"
    mirror_type: registry
    quick_use_template: |
      ```bash
      # 一次性使用
      npm install --registry={{ url }} <package>

      # 当前 shell 生效
      export NPM_CONFIG_REGISTRY={{ url }}

      # 永久写入用户配置（~/.npmrc）
      npm config set registry {{ url }}
      # yarn / pnpm 同样的命令把 npm 换成对应工具即可
      ```
  docker-hub:
    name: "Docker Hub"
    description: "Docker Hub 镜像加速（配置 daemon.json registry-mirrors）"
    icon: "🐳"
    mirror_type: registry
    quick_use_template: |
      > Docker daemon 不读环境变量，必须写入 `daemon.json` 后重启 Docker 才生效。

      Linux：
      ```bash
      sudo mkdir -p /etc/docker
      echo '{"registry-mirrors": ["{{ url }}"]}' | sudo tee /etc/docker/daemon.json
      sudo systemctl restart docker
      ```

      macOS / Windows：在 Docker Desktop → Settings → Docker Engine 里填
      ```json
      { "registry-mirrors": ["{{ url }}"] }
      ```
  cargo:
    name: "Rust (Cargo)"
    description: "Crates.io 注册源镜像，配置 cargo 下载 Rust 包的地址"
    icon: "🦀"
    mirror_type: registry
    quick_use_template: |
      ```bash
      # 永久写入用户配置（~/.cargo/config.toml）
      mkdir -p ~/.cargo
      cat >> ~/.cargo/config.toml <<'EOF'
      [source.crates-io]
      replace-with = "mirror"

      [source.mirror]
      registry = "sparse+{{ url }}"
      EOF
      ```
      > 需要 cargo 1.68+ 才支持 sparse 协议；老版本去掉 `sparse+` 前缀。
  homebrew:
    name: "Homebrew"
    description: "Homebrew tap 和 formula 镜像，配置 Homebrew 的 git 仓库地址"
    icon: "🍺"
    mirror_type: registry
    quick_use_template: |
      > Homebrew 涉及 4 个环境变量，且不同镜像的子路径不同，复制时请参考
      > [{{ name }} 官方帮助页]({{ homepage }})。下面以最常用的两个为例：

      ```bash
      # 当前 shell 生效（USTC 风格）
      export HOMEBREW_API_DOMAIN="https://mirrors.ustc.edu.cn/homebrew-bottles/api"
      export HOMEBREW_BOTTLE_DOMAIN="https://mirrors.ustc.edu.cn/homebrew-bottles"
      ```
  conda:
    name: "Conda/Anaconda"
    description: "Anaconda 包仓库镜像，配置 conda 频道地址（.condarc）"
    icon: "🐍"
    mirror_type: registry
    quick_use_template: |
      ```bash
      # 一次性使用（仅当前命令）
      conda install -c {{ url_clean }}/pkgs/main <package>

      # 永久写入 ~/.condarc
      conda config --remove-key channels 2>/dev/null || true
      conda config --add channels {{ url_clean }}/pkgs/main
      conda config --add channels {{ url_clean }}/pkgs/r
      conda config --add channels {{ url_clean }}/cloud/conda-forge
      conda config --set show_channel_urls yes
      ```
  go:
    name: "Go"
    description: "Go 模块代理镜像，配置 GOPROXY 环境变量"
    icon: "🐹"
    mirror_type: registry
    quick_use_template: |
      ```bash
      # 一次性使用（仅当前命令）
      GOPROXY={{ url }},direct go mod tidy

      # 当前 shell 生效
      export GOPROXY={{ url }},direct

      # 永久写入 go env
      go env -w GOPROXY={{ url }},direct
      ```
  flutter:
    name: "Flutter"
    description: "Flutter/Dart 包镜像，配置 PUB_HOSTED_URL 和 FLUTTER_STORAGE_BASE_URL"
    icon: "📱"
    mirror_type: registry
    quick_use_template: |
      ```bash
      # 当前 shell 生效（Flutter 官方中国网络配置）
      export PUB_HOSTED_URL=https://pub.flutter-io.cn
      export FLUTTER_STORAGE_BASE_URL={{ url }}

      # 永久写入 shell profile
      echo 'export PUB_HOSTED_URL=https://pub.flutter-io.cn' >> ~/.zshrc
      echo 'export FLUTTER_STORAGE_BASE_URL={{ url }}' >> ~/.zshrc
      ```

  # --- install: 工具本体安装源 ---
  docker-ce:
    name: "Docker CE"
    description: "Docker CE 安装包镜像（apt repo），用于安装 Docker 引擎本体"
    icon: "🐳"
    mirror_type: install
    quick_use_template: |
      > 把官方 Docker apt 源里的域名替换成镜像域名（Ubuntu/Debian 通用）。

      ```bash
      # 已安装 docker-ce 的系统，把 sources.list.d 里的 download.docker.com 替换为镜像
      sudo sed -i.bak 's|download.docker.com|{{ host }}/docker-ce|g' \
        /etc/apt/sources.list.d/docker.list
      sudo apt update
      ```
  python-install:
    name: "Python（安装本体）"
    description: "Python 发行版下载镜像，与 pyenv 配合安装 Python 本体（PYTHON_BUILD_MIRROR_URL）"
    icon: "🐍"
    mirror_type: install
    quick_use_template: |
      ```bash
      # 当前 shell 生效（让 pyenv 从国内镜像下载 Python 源码包）
      export PYTHON_BUILD_MIRROR_URL={{ url }}
      pyenv install 3.12.0
      ```
  node-install:
    name: "Node.js（安装本体）"
    description: "Node.js 二进制包下载镜像，与 nvm 配合安装 Node.js 本体（NVM_NODEJS_ORG_MIRROR）"
    icon: "📦"
    mirror_type: install
    quick_use_template: |
      ```bash
      # 当前 shell 生效（让 nvm 从国内镜像下载 Node.js 二进制）
      export NVM_NODEJS_ORG_MIRROR={{ url }}
      nvm install 20

      # fnm 用户改为
      export FNM_NODE_DIST_MIRROR={{ url }}
      ```
  conda-install:
    name: "Conda/Miniconda（安装本体）"
    description: "Miniconda/Anaconda 安装包下载镜像，用于下载 conda 工具本体的 .sh 安装包"
    icon: "🐍"
    mirror_type: install
    quick_use_template: |
      ```bash
      # Linux x86_64：直接下载并安装 Miniconda
      wget {{ url }}Miniconda3-latest-Linux-x86_64.sh
      bash Miniconda3-latest-Linux-x86_64.sh
      ```
  rust-install:
    name: "Rust/rustup（安装本体）"
    description: "Rust 工具链安装镜像，配置 RUSTUP_DIST_SERVER 安装 rustup 和 Rust 本体"
    icon: "🦀"
    mirror_type: install
    quick_use_template: |
      ```bash
      # 当前 shell 生效（rustup 安装/更新走国内镜像）
      export RUSTUP_DIST_SERVER={{ url }}
      export RUSTUP_UPDATE_ROOT={{ url }}/rustup
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh
      ```
  go-install:
    name: "Go（安装本体）"
    description: "Go 语言二进制包下载镜像，用于下载并安装 Go 语言本体"
    icon: "🐹"
    mirror_type: install
    quick_use_template: |
      ```bash
      # Linux x86_64：直接下载并解压 Go
      wget {{ url }}go1.22.0.linux-amd64.tar.gz
      sudo tar -C /usr/local -xzf go1.22.0.linux-amd64.tar.gz
      ```

  # --- download: 内容/资产下载镜像 ---
  github-release:
    name: "GitHub Releases"
    description: "GitHub release 资产下载镜像，加速下载工具的发布包"
    icon: "🐙"
    mirror_type: download
    quick_use_template: |
      ```bash
      # ghfast 通用代理：在原始 GitHub URL 前面拼接前缀即可
      curl -L -O https://ghfast.top/https://github.com/<owner>/<repo>/releases/download/<tag>/<asset>

      # TUNA / USTC 选择性镜像：把 https://github.com 替换为镜像前缀（仅收录的仓库可用）
      # 例：https://mirrors.tuna.tsinghua.edu.cn/github-release/git-for-windows/git/...
      ```
  github-repo:
    name: "GitHub Clone Acceleration"
    description: "GitHub 仓库 clone 加速代理"
    icon: "🐙"
    mirror_type: download
    quick_use_template: |
      ```bash
      # 一次性使用（仅这一次 clone）
      git clone {{ url }}https://github.com/<owner>/<repo>.git

      # 永久重写：让 git 把所有 github.com 的 clone 自动走镜像
      git config --global url."{{ url }}https://github.com/".insteadOf "https://github.com/"
      ```
  huggingface:
    name: "Hugging Face"
    description: "Hugging Face 模型和数据集下载镜像"
    icon: "🤗"
    mirror_type: download
    quick_use_template: |
      ```bash
      # 推荐：仅当前命令注入镜像（最安全，不污染环境）
      HF_ENDPOINT={{ url }} huggingface-cli download gpt2

      # 当前 shell 生效
      export HF_ENDPOINT={{ url }}
      ```
      > 不建议把 `HF_ENDPOINT` 写入 shell profile，会持续把流量导向镜像。

  # --- system: 系统包管理器源 ---
  ubuntu:
    name: "Ubuntu (apt)"
    description: "Ubuntu APT 软件源，配置 /etc/apt/sources.list"
    icon: "🐧"
    mirror_type: system
    quick_use_template: |
      ```bash
      # Ubuntu 24.04+（DEB822 格式）
      sudo sed -i.bak 's|http://archive.ubuntu.com|https://{{ host }}|g; s|http://security.ubuntu.com|https://{{ host }}|g' \
        /etc/apt/sources.list.d/ubuntu.sources

      # Ubuntu 22.04 及以前
      sudo sed -i.bak 's|http://archive.ubuntu.com|https://{{ host }}|g; s|http://security.ubuntu.com|https://{{ host }}|g' \
        /etc/apt/sources.list

      sudo apt update
      ```
      > sed 第一次运行会备份原文件到同名 `.bak`，便于回滚。
  alpine:
    name: "Alpine Linux"
    description: "Alpine Linux apk 包源，配置 /etc/apk/repositories"
    icon: "🏔️"
    mirror_type: system
    quick_use_template: |
      ```bash
      sudo sed -i.bak 's|dl-cdn.alpinelinux.org|{{ host }}|g' /etc/apk/repositories
      sudo apk update
      ```

# ==================== Health Check Settings ====================
health_check:
  timeout: 30
  retries: 2
  parallel: true
  max_workers: 10
  user_agent: "china-mirror-skills/0.1.0 (Health Check)"
