  # ==================== Docker Hub (Registry) ====================
  # IMPORTANT: These are Docker Hub image pull mirrors, NOT Docker CE install repos
  # Configure via /etc/docker/daemon.json registry-mirrors
  - id: docker-hub-1ms
    name: "1ms.run Docker Hub Mirror"
    category: docker-hub
    url: "https://docker.1ms.run"
    homepage: "https://docker.1ms.run"
    status: active
    priority: 1
    official_help: "https://docker.1ms.run"
    verify:
      type: http
      url: "https://docker.1ms.run/v2/"
      # 标准 Docker Registry v2 协议：未带 token 访问 /v2/ 应返回 401（携带 WWW-Authenticate）
      expect_status: 401
    notes: |
      配置方式：写入 /etc/docker/daemon.json
      {
        "registry-mirrors": ["https://docker.1ms.run"],
        "dns": ["1.1.1.1", "8.8.8.8"]
      }
      然后执行 sudo systemctl restart docker

  - id: docker-hub-daocloud
    name: "DaoCloud Docker Hub Mirror"
    category: docker-hub
    url: "https://docker.m.daocloud.io"
    homepage: "https://docker.m.daocloud.io"
    status: active
    priority: 2
    official_help: "https://docker.m.daocloud.io"
    verify:
      type: http
      url: "https://docker.m.daocloud.io/v2/"
      expect_status: 401
    notes: |
      配置方式：写入 /etc/docker/daemon.json
      {
        "registry-mirrors": ["https://docker.m.daocloud.io"],
        "dns": ["1.1.1.1", "8.8.8.8"]
      }
      然后执行 sudo systemctl restart docker

  - id: docker-hub-hlmirror
    name: "HLMirror Docker Hub Mirror"
    category: docker-hub
    url: "https://docker.hlmirror.com"
    homepage: "https://docker.hlmirror.com"
    # 2026-05：HLMirror 已 302 跳转到商业域名 mirror.houlang.cloud，需付费/认证。
    status: deprecated
    priority: 9
    official_help: "https://docker.hlmirror.com"
    verify:
      type: http
      url: "https://docker.hlmirror.com/v2/"
      # 跟随跳转后落到 houlang.cloud，返回 401（需付费认证），不再可用作公共镜像
      expect_status: 401
      inconclusive_statuses: [302, 401, 403]
    notes: |
      已弃用：服务于 2026 年迁移到 mirror.houlang.cloud 并改为付费/认证制，
      不再适合作为公共 Docker Hub 加速镜像。请改用 docker.1ms.run 或
      docker.m.daocloud.io（见上方两条）。

