# China Mirror Sources for Development Tools
# This file contains verified mirror sources for development tools in China
#
# Policy:
# - Prioritize official university mirrors (TUNA, USTC)
# - Prioritize official vendor mirrors (npmmirror, Tencent Cloud)
# - Require official documentation/help page for each mirror
# - Mark mirrors as deprecated if official announcement says so
#
# Status values:
# - active: Verified working, recommended
# - testing: Under evaluation
# - deprecated: Officially discontinued or unreliable
# - community: Community maintained, use with caution

version: "0.1.0"
updated_at: "2026-03-07"

