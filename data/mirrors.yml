    priority: 1
    official_help: "https://kubernetes.io/blog/2023/02/06/k8s-gcr-io-freeze-announcement/"
    verify:
      type: http
      url: "https://registry.k8s.io/v2/"
      expect_status_in: [200, 401]  # 不同网关实现可能返回 200 或 401，均视为健康
    notes: |
      IMPORTANT: k8s.gcr.io was frozen on March 20, 2023 and fully deprecated.
      New registry is registry.k8s.io.
      See: https://kubernetes.io/blog/2023/02/06/k8s-gcr-io-freeze-announcement/
      If you still have k8s.gcr.io references, update them immediately.

