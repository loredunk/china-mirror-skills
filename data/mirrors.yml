  # ==================== Docker Hub (Registry) ====================
  # IMPORTANT: These are Docker Hub image pull mirrors, NOT Docker CE install repos
  # Configure via /etc/docker/daemon.json registry-mirrors
  - id: docker-hub-hlmirror
    name: "HLMirror Docker Hub Mirror"
    category: docker-hub
    url: "https://docker.hlmirror.com"
    homepage: "https://docker.hlmirror.com"
    status: active
    priority: 1
    official_help: "https://docker.hlmirror.com"
    verify:
      type: http
      url: "https://docker.hlmirror.com/v2/"
      expect_status: 403
    notes: |
      配置方式：写入 /etc/docker/daemon.json
      {
        "registry-mirrors": ["https://docker.hlmirror.com"],
        "dns": ["1.1.1.1", "8.8.8.8"]
      }
      然后执行 sudo systemctl restart docker

