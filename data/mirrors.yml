  # ==================== Go ====================
  - id: go-proxy-cn
    name: "China Go Module Proxy"
    category: go
    url: "https://goproxy.cn"
    homepage: "https://goproxy.cn"
    status: active
    priority: 1
    official_help: "https://goproxy.cn"
    verify:
      type: go_proxy
      # GOPROXY 协议路径：/<module>/@v/<version>.info，返回 200+JSON 表示代理可用
      # 404 表示代理在线但未缓存该版本，同样视为健康
      url: "https://goproxy.cn/github.com/pkg/errors/@v/v0.9.1.info"
      expect_status_in: [200, 404]
    notes: "Official China Go module proxy by Qiniu Cloud, highly reliable"

