# ==================== Categories Metadata ====================
#
# mirror_type 说明：
#   registry  - 包管理器注册源（配置工具下载包的地址，工具必须已安装）
#   install   - 工具安装源（下载工具本体的镜像，用于首次安装工具）
#   download  - 内容下载镜像（下载文件/模型/Release 资产等）
#   system    - 系统包管理器源（apt/apk 等）
#
categories:
  # --- registry: 配置包管理器注册源 ---
  pip:
    name: "Python (pip)"
    description: "PyPI 包注册源镜像，配置 pip/uv/poetry 下载 Python 包的地址"
    icon: "🐍"
    mirror_type: registry
  npm:
    name: "Node.js (npm)"
    description: "npm 注册源镜像，配置 npm/yarn/pnpm 下载 JS 包的地址"
    icon: "📦"
    mirror_type: registry
  docker-hub:
    name: "Docker Hub"
    description: "Docker Hub 镜像加速（配置 daemon.json registry-mirrors）"
    icon: "🐳"
    mirror_type: registry
  cargo:
    name: "Rust (Cargo)"
    description: "Crates.io 注册源镜像，配置 cargo 下载 Rust 包的地址"
    icon: "🦀"
